version: '3.8'

networks:
  broker_mesh:
    driver: bridge

services:
  redis_broker:
    image: redis:7.2-alpine
    container_name: engine_redis_broker
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379" # Exposed locally for diagnostic visualization/GUI tools
    volumes:
      - redis_data:/data
    networks:
      - broker_mesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  producer_api:
    build:
      context: ./api
      dockerfile: ../api/Dockerfile # We will write multi-stage Dockerfiles next
    container_name: engine_producer_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis_broker:6379
      - NODE_ENV=development
    depends_on:
      redis_broker:
        condition: service_healthy
    networks:
      - broker_mesh

  consumer_worker:
    build:
      context: ./worker
      dockerfile: ../worker/Dockerfile
    container_name: engine_consumer_worker_1
    restart: always
    environment:
      - REDIS_URL=redis://redis_broker:6379
      - NODE_ENV=development
    depends_on:
      redis_broker:
        condition: service_healthy
    networks:
      - broker_mesh

volumes:
  redis_data:
    driver: local